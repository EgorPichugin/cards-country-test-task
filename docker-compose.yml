services:
  postgres:
    image: postgres:17-alpine
    container_name: dellin_postgres
    environment:
      POSTGRES_DB: dellin_dictionary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
